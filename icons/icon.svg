<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2129"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5b040"/>
      <stop offset="100%" stop-color="#e88a18"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Gauge track (dark ring) -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="#2a2f38" stroke-width="10"
          stroke-dasharray="179 60" stroke-dashoffset="-30" stroke-linecap="round"/>

  <!-- Gauge fill (orange arc ~70%) -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#arc)" stroke-width="10"
          stroke-dasharray="125 114" stroke-dashoffset="-30" stroke-linecap="round"/>

  <!-- Center text "CU" -->
  <text x="64" y="72" text-anchor="middle" fill="#e6edf3"
        font-family="monospace" font-size="26" font-weight="700" letter-spacing="-1">CU</text>
</svg>
