<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Colab Quota</title>
</head>
<body>
  <!-- State: Not authenticated -->
  <div id="state-unauth" class="state" hidden>
    <div class="header">
      <h1>Colab Quota</h1>
    </div>
    <div class="body">
      <p>Conecta tu cuenta Google para monitorear tus Compute Units.</p>
      <button id="btn-login" class="btn btn-primary">Conectar con Google</button>
    </div>
  </div>

  <!-- State: Authenticated -->
  <div id="state-auth" class="state" hidden>
    <div class="header">
      <h1>Colab Quota</h1>
      <div class="badge-wrap">
        <span id="tier-badge" class="badge"></span>
        <div id="tier-tooltip" class="tier-tooltip"></div>
      </div>
    </div>
    <div class="account-bar">
      <select id="account-select" class="account-select"></select>
      <button id="btn-add-account" class="btn-icon" title="Agregar cuenta">+</button>
    </div>
    <div class="balance-display">
      <span id="balance-value" class="balance-number"></span>
      <span class="balance-unit">CU</span>
    </div>
    <div class="metrics">
      <div class="metric-row" id="burn-row">
        <span class="metric-label">Consumo</span>
        <span class="metric-value" id="burn-rate"></span>
      </div>
      <div class="metric-row" id="time-row">
        <span class="metric-label">Restante</span>
        <span class="metric-value" id="time-remaining"></span>
      </div>
      <div class="metric-row" id="sessions-row">
        <span class="metric-label">Sesiones</span>
        <span class="metric-value" id="sessions"></span>
      </div>
      <div class="metric-row" id="refill-row" hidden>
        <span class="metric-label">Refill</span>
        <span class="metric-value metric-countdown" id="refill-countdown"></span>
      </div>
    </div>
    <div class="meta">
      <span id="last-updated"></span>
    </div>
    <div class="actions">
      <button id="btn-refresh" class="btn btn-secondary">Actualizar</button>
      <button id="btn-logout" class="btn btn-ghost">Eliminar cuenta</button>
    </div>
  </div>

  <!-- State: Error -->
  <div id="state-error" class="state" hidden>
    <div class="header">
      <h1>Colab Quota</h1>
    </div>
    <div class="body">
      <p class="error-message" id="error-text"></p>
      <button id="btn-retry" class="btn btn-primary">Reintentar</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
